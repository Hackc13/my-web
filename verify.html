<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email - CrazyHub</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="shortcut icon" href="assets/favicon.ico">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="stylesheet" href="assets/style.css">
</head>
<body class="clean-login">
<main class="auth-card">
<img class="auth-brand" src="assets/crazyhub-logo.png" alt="CrazyHub logo">
<h1>Verify your email</h1>

<p class="admin-note">
We sent a verification email to your address. Open your inbox, verify your email, then click below.
</p>

<button id="checkBtn" class="clean-primary">I verified my email</button>
<button id="resendBtn" class="clean-outline choice-link">Resend verification email</button>
<button id="logoutBtn" class="clean-outline choice-link">Logout</button>

<p id="message" class="clean-message"></p>
</main>
<script type="module" src="assets/verify.js"></script>
</body>
</html>
