<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/style.css">
<title>Edit Password - CrazyHub</title>
</head>
<body class="profile-page">
<div class="auth-grid-bg"></div>

<header class="profile-page-top">
  <a href="index.html" class="back-home">← Back to Home</a>
  <img src="assets/crazyhub-logo.png" alt="CrazyHub" class="profile-page-logo">
</header>

<main class="profile-page-main">
  <section class="profile-edit-card">
    <h1>Edit Password</h1>
    <p>Enter details and current password.</p>

    <label>Current Password</label>
    <input id="passwordCurrent" type="password" autocomplete="current-password" placeholder="Enter current password">

    <label>New Password</label>
    <input id="passwordNew" type="password" autocomplete="new-password" placeholder="Enter new password">

    <label>Retype New Password</label>
    <input id="passwordRetype" type="password" autocomplete="new-password" placeholder="Retype new password">

    <button id="savePasswordBtn" type="button">Change Password</button>
    <p id="passwordStatus" class="profile-form-status"></p>
  </section>
</main>

<script type="module" src="assets/edit-password.js"></script>
</body>
</html>
