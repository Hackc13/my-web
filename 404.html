let points = [];
let mouse = { x:-9999, y:-9999 };
const dpr = Math.min(window.devicePixelRatio || 1, 2);

function setupDots(){
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = rect.width;
  const h = rect.height;

  // Keep the same wide shape/proportions from the reference image.
  const targetW = Math.min(w * 0.92, h * 2.88);
  const targetH = targetW / 2.88;
  const offsetX = (w - targetW) / 2;
  const offsetY = (h - targetH) / 2;

  const dotSize = Math.max(1.25, Math.min(2.1, targetW / 650));

  points = BASE_POINTS.map(([nx, ny]) => {
    const x = offsetX + nx * targetW;
    const y = offsetY + ny * targetH;
    return {
      bx:x,
      by:y,
      x:x + (Math.random() - .5) * 3,
      y:y + (Math.random() - .5) * 3,
      vx:0,
      vy:0,
      s:dotSize
    };
  });
}

function animate(){
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);

  for(const p of points){
    const dx = p.x - mouse.x;
    const dy = p.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const radius = 78;

    if(dist < radius){
      const force = (radius - dist) / radius;
      const angle = Math.atan2(dy, dx);
      p.vx += Math.cos(angle) * force * 4.8;
      p.vy += Math.sin(angle) * force * 4.8;
    }

    p.vx += (p.bx - p.x) * 0.06;
    p.vy += (p.by - p.y) * 0.06;

    p.vx *= 0.80;
    p.vy *= 0.80;

    p.x += p.vx;
    p.y += p.vy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
    ctx.fillStyle = "#252525";
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

window.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

window.addEventListener("mouseleave", () => {
  mouse.x = -9999;
  mouse.y = -9999;
});

window.addEventListener("resize", setupDots);

setupDots();
animate();
</script>
