<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - CrazyHub</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="shortcut icon" href="assets/favicon.ico">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="animated-auth-page login-mode crazy-dark-auth">
<div class="auth-grid-bg"></div>
<div class="auth-orb auth-orb-one"></div>
<div class="auth-orb auth-orb-two"></div>

<main class="auth-browser forgot-auth-browser">
  <section class="auth-stage">
    <div class="animated-auth-card forgot-card">
      <div class="auth-form-side forgot-form-side">
        <img class="auth-brand animated-brand" src="assets/crazyhub-logo.png" alt="CrazyHub logo">
        <h1>Reset Password</h1>
        <p class="forgot-info">
          Enter your email or username. We will send a secure password reset email.
        </p>

        <label>Email or Username</label>
        <input id="resetInput" class="clean-input animated-input" type="text" autocomplete="username" placeholder="Email or username">

        <button id="sendResetBtn" type="button" class="animated-primary">SEND RESET EMAIL</button>
        <p id="resetMessage" class="clean-message"></p>

        <a class="forgot animated-link back-login-link" href="login.html">Back to Login</a>
      </div>

      <aside class="auth-welcome-side forgot-welcome-side">
        <div class="circle-deco circle-top"></div>
        <div class="circle-deco circle-bottom"></div>
        <h2>Secure Reset</h2>
        <p>Open the email link, create a new password, then login again to CrazyHub.</p>
        <a href="login.html" class="animated-outline">LOGIN</a>
      </aside>
    </div>
  </section>
</main>

<script type="module" src="assets/forgot-password.js"></script>
</body>
</html>
